name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          cache: yarn
      - run: corepack enable
      - run: yarn install --frozen-lockfile
      - run: yarn lint --max-warnings 0
